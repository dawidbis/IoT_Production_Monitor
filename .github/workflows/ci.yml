name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Layer 4: .NET application ────────────────────────────────────────────────
  dotnet:
    name: .NET build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test (unit + integration)
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore

  # ── Layer 3: PowerShell quality gates ────────────────────────────────────────
  powershell:
    name: PowerShell (PSScriptAnalyzer + Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis & Pester tests
        shell: pwsh
        run: ./scripts/Invoke-StaticAnalysis.ps1

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: "**/pester-results.xml"
          if-no-files-found: ignore

  # ── Layer 1: Infrastructure as Code ──────────────────────────────────────────
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
